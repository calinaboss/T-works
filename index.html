<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="fv.png" sizes="32x32">
    <link rel="apple-touch-icon" href="fv.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Works</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .logo-immagine {
            height: 45px; 
            width: auto;
            display: block;
        }

        .cambio-lingua {
            cursor: pointer;
            background: none;
            border: 1px solid #444;
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .cambio-lingua:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        main {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 60px;
            line-height: 1.3;
        }

        .sezione-progetti {
            margin-top: 40px;
        }

        .sezione-progetti h2 {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .sezione-progetti ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sezione-progetti li {
            margin-bottom: 18px;
            font-size: 1.1rem;
            color: #ccc;
        }

        .sezione-progetti a {
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px dashed #555;
            transition: color 0.2s, border-color 0.2s;
        }

        .sezione-progetti a:hover {
            color: #00bcd4;
            border-bottom: 1px solid #00bcd4;
        }

        .in-corso {
            color: #666 !important;
            font-style: italic;
        }

        footer {
            width: 100%;
            max-width: 800px;
            margin-top: auto;
            padding: 60px 20px 40px 20px;
            box-sizing: border-box;
            border-top: 1px solid #111;
        }

        .contatti {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .contatti p {
            margin: 0;
            color: #888;
            font-size: 1rem;
        }

        .contatti span {
            margin: 0;
            color: #ffffff;
            font-size: 1rem;
        }

        .contatti a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }

        .contatti a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="T-Works Logo" class="logo-immagine">
        <button class="cambio-lingua" id="bottoneLingua" onclick="cambiaLingua()">🇮🇹 IT</button>
    </header>

    <main>
        <h1 id="testo-principale">Website development for your company</h1>

        <section class="sezione-progetti">
            <h2 id="titolo-progetti">Projects</h2>
            <ul>
                <li>1. Verom - <a href="https://verom.it/" target="_blank">verom.it</a></li>
                <li>2. Aki Serramenti - <a href="https://akiserramenti.it/" target="_blank">akiserramenti.it</a></li>
                <li>3. Fire Burger & Tacos - <a href="https://fireburgershakes.com/" target="_blank">fireburger</a></li>
                <li>4. Istanbul Kebap Bassano - <a href="https://instanbulbdg.it/" target="_blank">instanbulbdg.it</a></li>
                <li class="in-corso" id="testo-in-corso">...and others..</li>
            </ul>
        </section>
    </main>

    <footer>
        <div class="contatti">
            <p>Email: <span>info@t-works.it</span></p>
            <p>Instagram: <a href="https://instagram.com/tworks.it" target="_blank">@tworks.it</a></p>
        </div>
    </footer>

    <script>
        
        let linguaCorrente = 'en';

        const traduzioni = {
            en: {
                principale: "Website development for your company",
                progetti: "Projects",
                inCorso: "...and others..",
                bottone: "🇮🇹 IT"
            },
            it: {
                principale: "Sviluppo siti web per la tua azienda",
                progetti: "Progetti",
                inCorso: "...e altri..",
                bottone: "🇬🇧 EN"
            }
        };

        function cambiaLingua() {
            linguaCorrente = linguaCorrente === 'en' ? 'it' : 'en';
            
            document.getElementById('testo-principale').innerText = traduzioni[linguaCorrente].principale;
            document.getElementById('titolo-progetti').innerText = traduzioni[linguaCorrente].progetti;
            document.getElementById('testo-in-corso').innerText = traduzioni[linguaCorrente].inCorso;
            document.getElementById('bottoneLingua').innerText = traduzioni[linguaCorrente].bottone;
        }
    </script>
</body>
</html>
